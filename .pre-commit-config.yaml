# Pre-commit hooks. Enable once per clone:
#   pipx install pre-commit   # or: brew install pre-commit
#   pre-commit install
# After that gitleaks runs automatically on every `git commit` and blocks any commit that
# would introduce a credential. Run manually on the whole repo:
#   pre-commit run --all-files
repos:
  # Secret scanning — blocks commits that would introduce credentials.
  # Pinned rev (supply-chain): bump deliberately, don't float.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

name: secrets-scan

# Server-side gate: catches secrets even if a contributor commits with
# `--no-verify` (which skips the local pre-commit gitleaks hook).
#
# Runs the gitleaks BINARY directly (pinned version + SHA256-verified) rather
# than gitleaks-action: no commercial license / GITLEAKS_LICENSE dependency,
# no third-party JS at runtime, works for fork PRs (no secrets needed).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for a complete scan

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version

      - name: Scan full history
        run: ./gitleaks git . --redact --exit-code 1

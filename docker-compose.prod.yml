# Production compose — for the always-on Mac mini, driven by openclaw-setup's
# `claw-deploy` menu. This is a STANDALONE file (not an overlay on
# docker-compose.yml, which stays the local-dev file). Run it explicitly:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from the dev compose (docker-compose.yml):
#   • Postgres data on a HOST bind mount — the mini's Colima VM is disposable
#     (a rebuild wipes named volumes); host data survives. See openclaw-setup
#     info/08-Docker-Deploy.md.
#   • No source bind mount and no --reload — the image ships the code (COPY . .).
#   • DB and Redis are NOT published to the host; only the API, on loopback.
#   • Secrets come from a .env rendered at deploy time from 1Password (never
#     committed; .env is gitignored).
#   • telegram_bot runs in POLLING mode (python bot.py) — no public URL, works
#     behind Tailscale/NAT, so the mini is never exposed to the internet. The
#     webhook path (app startup set_webhook) stays OFF because TELEGRAM_WEBHOOK_URL
#     is not set. ⚠️ A bot token serves ONE instance: run this bot on the mini
#     ONLY if no other instance (e.g. nutricore.cloud) is polling the same token,
#     or Telegram returns "Conflict: terminated by other getUpdates request".
name: nutricore

services:

  app:
    build: .
    restart: unless-stopped
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"   # API on the host loopback only (reach via Tailscale/SSH)
    depends_on:
      - db
      - redis
    networks:
      - bot-network

  db:
    image: postgres:15
    restart: unless-stopped
    # HOST bind mount (Mac path, mounted into the Colima VM) — survives colima delete.
    # The claw-deploy install creates /Users/claw/data/<project>/ owned by claw.
    volumes:
      - /Users/claw/data/nutricore/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - bot-network      # no host ports — reachable only inside the compose network

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - bot-network      # no host ports; broker/cache is ephemeral

  celery_worker:
    build: .
    restart: unless-stopped
    command: python -m celery -A celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - bot-network

  celery_beat:
    build: .
    restart: unless-stopped
    command: python -m celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - celery_worker
    networks:
      - bot-network

  telegram_bot:
    build: .
    restart: unless-stopped
    command: python bot.py          # POLLING (run_polling) — no public URL needed
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      - db
      - redis
    networks:
      - bot-network                 # no host ports; reaches Telegram outbound only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    driver: bridge
